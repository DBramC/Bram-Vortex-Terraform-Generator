spring.config.import=vault://secret/bram_vortex_db/terraform,vault://secret/ai_key

spring.application.name=bram-vortex-terraform-generator

spring.cloud.vault.uri=http://vault.vault.svc.cluster.local:8200
spring.cloud.vault.authentication=KUBERNETES
spring.cloud.vault.kubernetes.role=terraform-generator-role
spring.cloud.vault.kubernetes.service-account-token-file=/var/run/secrets/kubernetes.io/serviceaccount/token
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.version=1
#DO NOT LOOK AT application/secret
spring.cloud.vault.kv.default-context=
#
spring.ai.googlegenai.chat.options.model=gemma-4-31b-it

# ?????????????? ??????? ????????? (??? ??  ??? ????????? ?? pom.xml)
spring.ai.google.genai.chat.options.safety-settings[0].category=HARM_CATEGORY_DANGEROUS_CONTENT
spring.ai.google.genai.chat.options.safety-settings[0].threshold=BLOCK_NONE

spring.ai.google.genai.chat.options.safety-settings[1].category=HARM_CATEGORY_HARASSMENT
spring.ai.google.genai.chat.options.safety-settings[1].threshold=BLOCK_NONE

spring.ai.google.genai.chat.options.safety-settings[2].category=HARM_CATEGORY_HATE_SPEECH
spring.ai.google.genai.chat.options.safety-settings[2].threshold=BLOCK_NONE

spring.ai.google.genai.chat.options.safety-settings[3].category=HARM_CATEGORY_SEXUALLY_EXPLICIT
spring.ai.google.genai.chat.options.safety-settings[3].threshold=BLOCK_NONE

# --- JPA / Database ---
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate